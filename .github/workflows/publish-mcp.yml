name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - "server.json"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish
        uses: modelcontextprotocol/registry@v1
        with:
          server_json_path: server.json
